# =====================================================================
# MATRIZ DE MOVIMENTO "otimizada" — marcha do robô bípede AX-12.
#
# Este arquivo descreve UM ciclo de marcha. O send_gait.py lê tudo
# daqui, então dá para ajustar a marcha SEM editar/recompilar o código.
#
#   passo  : duração da transição entre duas poses (segundos)
#   pausa  : repouso extra após cada transição (segundos)
#
#   nomes_juntas    : nomes ROS das juntas. PRECISAM ser idênticos ao
#                     joint_map do ax12_controller. A ORDEM importa: a
#                     linha N da matriz comanda a junta N desta lista.
#
#   matriz_movimento: uma LINHA por junta (mesma ordem de nomes_juntas),
#                     uma COLUNA por passo do ciclo. Valores em RADIANOS.
#
# Os rolls de tornozelo (pd_roll_tornozelo_1 e pe_roll_tornozelo_2) estão ativos
# no controlador, mas de propósito NÃO entram na marcha: recebem torque e ficam
# rígidos. Para movê-los, acrescente o nome em nomes_juntas e uma linha
# correspondente na matriz_movimento, na MESMA ordem.
# =====================================================================

passo: 1.0
pausa: 0.5

nomes_juntas:
  - pd_picht_tornozelo_3
  - pe_picht_tornozelo_4
  - pd_picht_joelho_5
  - pe_picht_joelho_6
  - pd_picht_quadril_7
  - pe_pich_quadril_8

matriz_movimento:
  - [-0.7418,  0.0873,  0.2182, -0.7418,  0.5236,  0.5236, -0.7418]  # pd_picht_tornozelo_3
  - [-0.7418,  0.0873,  0.2182, -0.7418,  0.5236,  0.5236, -0.7418]  # pe_picht_tornozelo_4
  - [ 1.3963,  1.0472,  0.4363,  0.1745,  0.5236,  0.7854,  1.3963]  # pd_picht_joelho_5
  - [ 1.3963,  1.0472,  0.4363,  0.1745,  0.5236,  0.7854,  1.3963]  # pe_picht_joelho_6
  - [ 0.0,    -0.7854, -0.6981,  0.4800,  0.4800,  0.3491,  0.0   ]  # pd_picht_quadril_7
  - [ 0.0,    -0.7854, -0.6981,  0.4800,  0.4800,  0.3491,  0.0   ]  # pe_pich_quadril_8
