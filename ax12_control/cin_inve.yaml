# =====================================================================
# MATRIZ DE MOVIMENTO "cin_inve" — gerada da cinemática inversa dos pés.
# Origem: angulos.mat (variavel angulos_rad, 8 juntas x 4 etapas).
#
# Mesmo formato/uso do otimizada.yaml (lido pelo send_gait.py):
#   passo  : duração da transição entre duas poses (segundos)
#   pausa  : repouso extra após cada transição (segundos)
#   nomes_juntas    : nomes ROS (padrão URDF).
#   matriz_movimento: 1 LINHA por junta, 1 COLUNA por etapa. Em RADIANOS.
#
# ATENÇÃO — rolls de tornozelo: ao contrário do otimizada.yaml (onde os rolls
# ficam de fora e seguram a posição livremente), aqui pd_roll_tornozelo_1 e
# pe_roll_tornozelo_2 ENTRAM na marcha comandados em 0.0 rad (centro), como
# vieram da cinemática inversa. Se preferir deixá-los livres, apague as 2
# linhas de roll e os 2 nomes correspondentes.
#
# pd_roll_quadril_9 / pe_roll_quadril_10 (motores novos, IDs 9 e 14): ativos
# no joint_map do ax12_controller, mas de propósito FORA desta matriz — ainda
# não há cinemática inversa calculada para eles. Seguram a posição com
# torque. Para incluí-los, acrescente os nomes acima e uma linha por junta
# na matriz_movimento, na mesma ordem.
#
# Etapas (colunas), nesta ordem:
#   1) pe_direito_a_frente   2) pe_esquerdo_a_cima
#   3) pe_esquerdo_a_frente  4) pe_direito_a_cima
# =====================================================================

passo: 1.0
pausa: 0.5

nomes_juntas:
  - pd_picht_tornozelo_3
  - pe_picht_tornozelo_4
  - pd_roll_tornozelo_1
  - pe_roll_tornozelo_2
  - pd_picht_joelho_5
  - pe_picht_joelho_6
  - pd_picht_quadril_7
  - pe_pich_quadril_8

matriz_movimento:
  #    pe_dir_frente   pe_esq_cima   pe_esq_frente   pe_dir_cima
  - [-0.235500,      -0.727600,     -0.947100,      -1.207900]  # pd_picht_tornozelo_3
  - [ 0.947100,       1.207900,      0.235500,       0.727600]  # pe_picht_tornozelo_4
  - [ 0.000000,       0.000000,      0.000000,       0.000000]  # pd_roll_tornozelo_1
  - [ 0.000000,       0.000000,      0.000000,       0.000000]  # pe_roll_tornozelo_2
  - [ 1.200200,       1.456600,      1.171100,       2.410600]  # pd_picht_joelho_5
  - [-1.171000,      -2.410600,     -1.200200,      -1.456600]  # pe_picht_joelho_6
  - [-0.964700,      -0.729000,     -0.223900,      -1.202700]  # pd_picht_quadril_7
  - [ 0.223900,       1.202700,      0.964700,       0.729000]  # pe_pich_quadril_8
