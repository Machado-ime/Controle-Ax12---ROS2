# =====================================================================
# MATRIZ DE MOVIMENTO "matriz_zmp" — marcha por ZMP (cinematica inversa dos pes).
#
# Gerada de matriz_passo.mat (Cinematica inversa dos pes). Marcha COMPLETA de
# 10 juntas x 8 etapas, com o balanceio lateral (roll) ja embutido a partir do
# planejamento de ZMP (Zero Moment Point). Roll amplitude 0.2525 rad (14.47 graus),
# tornozelo e quadril iguais e opostos (tronco na vertical).
#
# As 8 etapas (colunas), na ordem do .mat:
#   1) PD_frente_roll_centro
#   2) PD_frente_peso_dir
#   3) PE_no_ar_peso_dir
#   4) PE_frente_peso_dir
#   5) PE_frente_roll_centro
#   6) PE_frente_peso_esq
#   7) PD_no_ar_peso_esq
#   8) PD_frente_peso_esq
#
# Legenda: PD/PE = pe direito/esquerdo; frente/no_ar = apoiado a frente / no ar;
# roll_centro = rolls neutros; peso_dir/peso_esq = peso (ZMP) transferido para a
# perna direita/esquerda. Gerada por script a partir do .mat (valores exatos).
# =====================================================================

passo: 1.0
pausa: 0.5

nomes_juntas:
  - pd_roll_tornozelo_1
  - pe_roll_tornozelo_2
  - pd_picht_tornozelo_3
  - pe_picht_tornozelo_4
  - pd_picht_joelho_5
  - pe_picht_joelho_6
  - pd_picht_quadril_7
  - pe_pich_quadril_8
  - pd_roll_quadril_9
  - pe_roll_quadril_10

matriz_movimento:
  - [  0.000000, -0.252549, -0.252549, -0.252549,  0.000000,  0.252549,  0.000000,  0.000000 ]  # pd_roll_tornozelo_1
  - [  0.000000, -0.252549,  0.000000,  0.000000,  0.000000,  0.252549,  0.252549,  0.252549 ]  # pe_roll_tornozelo_2
  - [ -0.435900, -0.435900, -0.644700, -0.782000, -0.782000, -0.782000, -0.939500, -0.435900 ]  # pd_picht_tornozelo_3
  - [  0.782000,  0.782000,  0.939500,  0.435900,  0.435900,  0.435900,  0.644700,  0.782000 ]  # pe_picht_tornozelo_4
  - [  1.233100,  1.233100,  1.288700,  1.203500,  1.203500,  1.203500,  1.872100,  1.233100 ]  # pd_picht_joelho_5
  - [ -1.203500, -1.203500, -1.872100, -1.233100, -1.233100, -1.233100, -1.288700, -1.203500 ]  # pe_picht_joelho_6
  - [ -0.797200, -0.797200, -0.644000, -0.421400, -0.421400, -0.421400, -0.932500, -0.797200 ]  # pd_picht_quadril_7
  - [  0.421400,  0.421400,  0.932500,  0.797200,  0.797200,  0.797200,  0.644000,  0.421400 ]  # pe_pich_quadril_8
  - [  0.000000,  0.252549,  0.252549,  0.252549,  0.000000, -0.252549,  0.000000,  0.000000 ]  # pd_roll_quadril_9
