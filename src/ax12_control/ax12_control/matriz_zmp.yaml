# MATRIZ DE MOVIMENTO "matriz_zmp" — marcha por ZMP (cinematica inversa dos pes).
#
# Gerada de matriz_passo.mat (Cinematica inversa dos pes). Marcha COMPLETA de
# 10 juntas x 6 etapas, com o balanceio lateral (roll) ja embutido a partir do
# planejamento de ZMP (Zero Moment Point). Roll amplitude 0.2525 rad (14.47),
# tornozelo e quadril iguais e opostos (tronco na vertical).
#
# As 6 etapas (colunas), na ordem do .mat:
#   1) PD_frente_zmp_dir_-A
#   2) PE_no_ar_zmp_dir_0
#   3) PE_frente_zmp_dir_+A
#   4) PE_frente_zmp_esq_-A
#   5) PD_no_ar_zmp_esq_0
#   6) PD_frente_zmp_esq_+A
#
# Legenda: PD/PE = pe direito/esquerdo; frente/no_ar = apoiado a frente / no ar;
# zmp_dir/esq = peso (ZMP) sobre a perna direita/esquerda; -A/0/+A = fase do
# deslocamento lateral. Gerada por script a partir do .mat (valores exatos).
# =====================================================================

